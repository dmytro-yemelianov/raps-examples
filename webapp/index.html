<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAPS · Test Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080a0f;
      --surface:  #0e1117;
      --panel:    #12161e;
      --border:   #1c2130;
      --border2:  #232a3a;
      --text:     #c9d1e0;
      --text2:    #5a6680;
      --text3:    #2d3448;
      --accent:   #4f8ef7;
      --green:    #2dd68c;
      --red:      #f2506a;
      --yellow:   #f0a020;
      --purple:   #9b72f7;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px;
    }

    /* ─── Token Gate ─── */
    #token-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 0;
      background: var(--bg);
    }
    .gate-logo {
      font-family: var(--sans);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 4px;
    }
    .gate-logo span { color: var(--accent); }
    .gate-sub {
      font-size: 0.72rem;
      color: var(--text2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 28px 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .gate-label {
      font-size: 0.7rem;
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #token-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #token-input:focus { border-color: var(--accent); }
    .gate-btn {
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .gate-btn:hover { opacity: 0.88; }
    #token-error { color: var(--red); font-size: 0.75rem; display: none; }

    /* ─── App shell ─── */
    #app { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }

    /* ─── Top header ─── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #fff;
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }
    .logo-sep {
      width: 1px;
      height: 20px;
      background: var(--border2);
      flex-shrink: 0;
    }
    #meta {
      font-size: 0.72rem;
      color: var(--text2);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hdr-actions { display: flex; align-items: center; gap: 8px; }
    #run-btn {
      padding: 7px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    #run-btn:disabled { background: var(--border2); color: var(--text2); cursor: not-allowed; }
    #run-btn:hover:not(:disabled) { opacity: 0.85; }
    #abort-btn {
      padding: 7px 14px;
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(242,80,106,0.35);
      border-radius: 5px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: none;
      transition: background 0.15s;
    }
    #abort-btn:hover { background: rgba(242,80,106,0.1); }

    /* ─── Auth bar ─── */
    #auth-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .auth-label { font-size: 0.65rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
    .auth-chip {
      padding: 3px 9px;
      border-radius: 3px;
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
    }
    .auth-ok  { color: var(--green); border-color: rgba(45,214,140,0.25); background: rgba(45,214,140,0.07); }
    .auth-miss { color: var(--text2); border-color: var(--border2); background: transparent; }
    #login-btn, #logout-btn {
      padding: 4px 12px;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #login-btn {
      background: rgba(155,114,247,0.15);
      color: var(--purple);
      border: 1px solid rgba(155,114,247,0.3);
      display: none;
    }
    #login-btn:hover:not(:disabled) { opacity: 0.8; }
    #login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #logout-btn {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
      display: none;
    }
    #logout-btn:hover:not(:disabled) { color: var(--text); }
    #logout-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #auth-url-wrap {
      display: none;
      width: 100%;
      align-items: center;
      gap: 8px;
      background: rgba(79,142,247,0.07);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 4px;
      padding: 7px 12px;
      margin-top: 2px;
      flex-wrap: wrap;
    }
    #auth-url-wrap .aw-label { font-size: 0.68rem; color: var(--text2); white-space: nowrap; }
    #auth-url-link {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      flex: 1;
    }
    #auth-url-link:hover { text-decoration: underline; }
    #auth-url-dismiss {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 4px;
    }

    /* ─── Progress panel ─── */
    #progress-panel {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px 12px;
      flex-shrink: 0;
      display: none;
    }
    #progress-track {
      height: 2px;
      background: var(--border2);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.4s ease, background 0.3s;
    }
    #progress-fill.has-fail { background: var(--red); }
    #progress-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .pstat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
    }
    .pstat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ps-pass .pstat-dot { background: var(--green); }
    .ps-fail .pstat-dot { background: var(--red); }
    .ps-skip .pstat-dot { background: var(--text2); }
    .pstat-val { font-weight: 500; }
    .ps-pass .pstat-val { color: var(--green); }
    .ps-fail .pstat-val { color: var(--red); }
    .ps-skip .pstat-val { color: var(--text2); }
    #prog-pct { color: var(--text2); font-size: 0.7rem; margin-left: 4px; }
    #prog-current {
      font-size: 0.68rem;
      color: var(--text3);
      margin-left: auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 320px;
    }

    /* ─── Tab bar ─── */
    #tab-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      padding: 0 20px;
      gap: 0;
    }
    .tab {
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    #tab-badge {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(79,142,247,0.15);
      color: var(--accent);
      border-radius: 3px;
      font-size: 0.65rem;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ─── Results tab ─── */
    #pane-results {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    #filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .fsel {
      background: var(--panel);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 4px;
      padding: 5px 8px;
      font-family: var(--mono);
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
    }
    .fsel:focus { border-color: var(--accent); }
    .fcheck {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }
    .fcheck input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
    #summary-line {
      padding: 5px 20px;
      font-size: 0.68rem;
      color: var(--text3);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .table-scroll { flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--surface);
      text-align: left;
      padding: 8px 12px;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border2);
      white-space: nowrap;
    }
    td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr.data-row:hover td { background: rgba(255,255,255,0.02); }
    tr.data-row.has-out { cursor: pointer; }
    tr.group-sep td {
      padding: 10px 12px 4px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .group-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    tr.detail-row td { padding: 0; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border2); }
    .detail-body {
      padding: 10px 12px 12px 28px;
      font-size: 0.72rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 280px;
      overflow-y: auto;
      color: var(--text2);
    }
    .detail-body.fail { color: #ff8090; }
    .detail-body.skip { color: var(--text2); font-style: italic; }

    /* Status badges */
    .st {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .st-dot { width: 5px; height: 5px; border-radius: 50%; }
    .st-passed  { color: var(--green); border-color: rgba(45,214,140,0.2); background: rgba(45,214,140,0.06); }
    .st-passed .st-dot  { background: var(--green); }
    .st-failed  { color: var(--red); border-color: rgba(242,80,106,0.2); background: rgba(242,80,106,0.06); }
    .st-failed .st-dot  { background: var(--red); }
    .st-skipped { color: var(--text2); border-color: var(--border2); background: transparent; }
    .st-skipped .st-dot { background: var(--text2); }
    .st-not-run { color: var(--text3); border-color: transparent; background: transparent; }
    .st-not-run .st-dot { background: var(--text3); }
    .st-error   { color: var(--yellow); border-color: rgba(240,160,32,0.2); background: rgba(240,160,32,0.06); }
    .st-error .st-dot   { background: var(--yellow); }
    .st-running { color: var(--accent); border-color: rgba(79,142,247,0.25); background: rgba(79,142,247,0.07); animation: pulse-st 1.4s ease infinite; }
    .st-running .st-dot { background: var(--accent); animation: blink-dot 1.4s ease infinite; }
    @keyframes pulse-st { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
    @keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* Table cell styles */
    .cell-id {
      font-size: 0.72rem;
      font-weight: 500;
      color: #7894c0;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .expand-arrow { font-size: 0.6rem; color: var(--text3); transition: transform 0.15s; }
    .expand-arrow.open { transform: rotate(90deg); color: var(--text2); }
    .cell-cmd { font-size: 0.72rem; color: var(--text2); word-break: break-all; max-width: 340px; }
    .cell-section { font-size: 0.68rem; color: var(--text3); white-space: nowrap; }
    .cell-mark {
      display: inline-block;
      padding: 1px 5px;
      font-size: 0.62rem;
      background: rgba(79,142,247,0.1);
      color: rgba(79,142,247,0.7);
      border-radius: 2px;
      margin-right: 3px;
    }
    .cell-dur { font-size: 0.7rem; color: var(--text3); white-space: nowrap; }

    @media (max-width: 700px) {
      .col-section, .col-marks, .col-dur { display: none; }
    }

    /* ─── Log tab ─── */
    #pane-log {
      flex: 1; display: none; flex-direction: column; min-height: 0;
    }
    #log-toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #log-clear-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
    }
    #log-clear-btn:hover { color: var(--text); border-color: var(--text2); }
    #log-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      font-size: 0.75rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      color: #7a8ca8;
    }
    #log-scroll .log-pass  { color: var(--green); }
    #log-scroll .log-fail  { color: var(--red); }
    #log-scroll .log-skip  { color: var(--text2); }
    #log-scroll .log-head  { color: var(--accent); }

    /* ─── Graph tab ─── */
    #pane-graph {
      flex: 1; display: none; flex-direction: column; min-height: 0;
      position: relative;
    }
    #graph-toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #graph-search {
      width: 200px;
      padding: 5px 10px;
      background: var(--panel);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.75rem;
      outline: none;
    }
    #graph-search:focus { border-color: var(--accent); }
    #graph-search::placeholder { color: var(--text3); }
    #graph-reset-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    #graph-reset-btn:hover { color: var(--text); border-color: var(--text2); }
    #graph-body { flex: 1; display: flex; position: relative; min-height: 0; }
    #graph-canvas { flex: 1; display: block; cursor: grab; }
    #graph-canvas.dragging { cursor: grabbing; }
    #graph-tooltip {
      display: none;
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.72rem;
      color: var(--text);
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
    #graph-info {
      width: 280px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    #graph-info-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #gi-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .gi-cmd {
      font-family: var(--mono);
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
    }
    .gi-depth-badge {
      font-size: 0.6rem;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    #gi-desc {
      font-size: 0.75rem;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .gi-section-title {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #gi-subs-section { margin-bottom: 14px; }
    .gi-sub-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 3px 0;
      gap: 8px;
      cursor: pointer;
      border-radius: 3px;
      padding: 3px 5px;
      margin: 0 -5px;
    }
    .gi-sub-item:hover { background: rgba(79,142,247,0.08); }
    .gi-sub-name {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
    }
    .gi-sub-desc {
      font-size: 0.65rem;
      color: var(--text3);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .gi-opt-item {
      padding: 3px 0;
    }
    .gi-opt-flag {
      font-size: 0.7rem;
      color: var(--green);
      font-family: var(--mono);
    }
    .gi-opt-desc {
      font-size: 0.63rem;
      color: var(--text3);
      margin-top: 1px;
    }
    @media (max-width: 900px) {
      #graph-info { display: none; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  </style>
</head>
<body>

<!-- Token gate -->
<div id="token-gate">
  <div class="gate-logo">RAPS<span>.</span></div>
  <div class="gate-sub">Test Monitor</div>
  <div class="gate-card">
    <div class="gate-label">Dashboard Token</div>
    <input id="token-input" type="password" placeholder="Enter token…" autocomplete="current-password">
    <button class="gate-btn" onclick="submitToken()">Access Dashboard</button>
    <div id="token-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="logo">RAPS<span>.</span></div>
    <div class="logo-sep"></div>
    <div id="meta">No run data</div>
    <div class="hdr-actions">
      <button id="abort-btn" onclick="abortRun()">Abort</button>
      <button id="run-btn" onclick="triggerRun()">Run Tests</button>
    </div>
  </header>

  <div id="auth-bar">
    <span class="auth-label">Auth</span>
    <span id="auth-2leg" class="auth-chip auth-miss">2-leg —</span>
    <span id="auth-3leg" class="auth-chip auth-miss">3-leg —</span>
    <button id="login-btn" onclick="triggerLogin()">Login device code</button>
    <button id="logout-btn" onclick="triggerLogout()">Logout</button>
    <div id="auth-url-wrap">
      <span class="aw-label">Open to authenticate:</span>
      <a id="auth-url-link" href="#" target="_blank" rel="noopener">···</a>
      <button id="auth-url-dismiss" onclick="document.getElementById('auth-url-wrap').style.display='none'" title="Dismiss">✕</button>
    </div>
  </div>

  <div id="progress-panel">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-stats">
      <div class="pstat ps-pass"><div class="pstat-dot"></div><span class="pstat-val" id="ps-passed">0</span><span style="color:var(--text2)">passed</span></div>
      <div class="pstat ps-fail"><div class="pstat-dot"></div><span class="pstat-val" id="ps-failed">0</span><span style="color:var(--text2)">failed</span></div>
      <div class="pstat ps-skip"><div class="pstat-dot"></div><span class="pstat-val" id="ps-skipped">0</span><span style="color:var(--text2)">skipped</span></div>
      <span id="prog-pct" style="color:var(--text2)">0%</span>
      <span id="prog-current"></span>
    </div>
  </div>

  <div id="tab-bar">
    <button class="tab active" onclick="switchTab('results')">Results <span id="tab-badge">0</span></button>
    <button class="tab" onclick="switchTab('log')">Live Log</button>
    <button class="tab" onclick="switchTab('graph')">Command Graph</button>
  </div>

  <div id="pane-results">
    <div id="filters">
      <select class="fsel" id="f-section" onchange="renderTable()">
        <option value="">All sections</option>
      </select>
      <select class="fsel" id="f-status" onchange="renderTable()">
        <option value="">All statuses</option>
        <option>passed</option>
        <option>failed</option>
        <option>skipped</option>
        <option>not run</option>
      </select>
      <label class="fcheck"><input type="checkbox" value="require_2leg" onchange="renderTable()"> 2-leg</label>
      <label class="fcheck"><input type="checkbox" value="require_3leg" onchange="renderTable()"> 3-leg</label>
      <label class="fcheck"><input type="checkbox" value="lifecycle" onchange="renderTable()"> lifecycle</label>
    </div>
    <div id="summary-line">—</div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:88px">SR-ID</th>
            <th>Command</th>
            <th class="col-section">Section</th>
            <th class="col-marks">Marks</th>
            <th style="width:96px">Status</th>
            <th class="col-dur" style="width:72px">Time</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="pane-log">
    <div id="log-toolbar">
      <button id="log-clear-btn" onclick="clearLog()">Clear</button>
      <span style="font-size:0.68rem;color:var(--text3)" id="log-status"></span>
    </div>
    <div id="log-scroll"></div>
  </div>

  <div id="pane-graph">
    <div id="graph-toolbar">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        <input id="graph-search" type="text" placeholder="Search commands…" autocomplete="off" spellcheck="false">
        <span style="font-size:0.65rem;color:var(--text3)">Drag · Scroll zoom · Click to inspect</span>
      </div>
      <button id="graph-reset-btn" onclick="resetGraph()">Reset</button>
    </div>
    <div id="graph-body">
      <canvas id="graph-canvas"></canvas>
      <div id="graph-tooltip"></div>
      <div id="graph-info">
        <div id="graph-info-empty">
          <span style="color:var(--text3);font-size:0.75rem">Click a node to inspect</span>
        </div>
        <div id="graph-info-content" style="display:none">
          <div id="gi-header">
            <span id="gi-cmd" class="gi-cmd"></span>
            <span id="gi-depth" class="gi-depth-badge"></span>
          </div>
          <div id="gi-desc"></div>
          <div id="gi-subs-section">
            <div class="gi-section-title">Subcommands</div>
            <div id="gi-subs"></div>
          </div>
          <div id="gi-opts-section" style="display:none">
            <div class="gi-section-title">Options</div>
            <div id="gi-opts"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let TOKEN = localStorage.getItem('raps_token') || '';
  let rows = [];
  let _renderPending = false;
  let _activeWs = null;

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function scheduleRender() {
    if (_renderPending) return;
    _renderPending = true;
    requestAnimationFrame(() => { _renderPending = false; renderTable(); });
  }

  function statusClass(outcome) {
    const map = { passed: 'passed', failed: 'failed', skipped: 'skipped',
                  'not run': 'not-run', error: 'error', running: 'running' };
    return 'st-' + (map[outcome] || 'not-run');
  }
  function statusLabel(outcome) {
    if (outcome === 'not run') return '—';
    return outcome;
  }
  function statusDot(outcome) {
    return `<span class="st-dot"></span>`;
  }
  function statusBadge(outcome) {
    const cls = statusClass(outcome);
    return `<span class="st ${cls}">${statusDot(outcome)}${esc(statusLabel(outcome))}</span>`;
  }

  // ── Auth & Login ────────────────────────────────────────────────────────────
  if (TOKEN) attemptAutoLogin();

  async function attemptAutoLogin() {
    try {
      const r = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
      if (r.ok) { showApp(); applyData(await r.json()); }
      else { localStorage.removeItem('raps_token'); TOKEN = ''; }
    } catch(_) { localStorage.removeItem('raps_token'); TOKEN = ''; }
  }

  async function submitToken() {
    TOKEN = document.getElementById('token-input').value.trim();
    const errEl = document.getElementById('token-error');
    errEl.style.display = 'none';
    const r = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
    if (r.status === 401) {
      errEl.textContent = 'Invalid token — try again'; errEl.style.display = 'block'; return;
    }
    if (!r.ok) {
      errEl.textContent = 'Server error'; errEl.style.display = 'block'; return;
    }
    localStorage.setItem('raps_token', TOKEN);
    showApp();
    applyData(await r.json());
  }

  function showApp() {
    document.getElementById('token-gate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadAuth();
    checkRunStatus();
  }

  async function checkRunStatus() {
    try {
      const r = await fetch('/api/run-status?token=' + encodeURIComponent(TOKEN));
      if (!r.ok) return;
      const d = await r.json();
      if (d.running) {
        // Run already in progress — reconnect via ws/stream
        reconnectToRun();
      }
    } catch(_) {}
  }

  async function loadResults() {
    try {
      const r = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
      if (r.ok) applyData(await r.json());
    } catch(_) {}
  }

  async function loadAuth() {
    try {
      const r = await fetch('/api/auth?token=' + encodeURIComponent(TOKEN));
      if (!r.ok) return;
      const d = await r.json();
      const el2 = document.getElementById('auth-2leg');
      const el3 = document.getElementById('auth-3leg');
      el2.textContent = '2-leg ' + (d.two_legged ? '✓' : '✗');
      el2.className = 'auth-chip ' + (d.two_legged ? 'auth-ok' : 'auth-miss');
      el3.textContent = '3-leg ' + (d.three_legged ? '✓' : '✗');
      el3.className = 'auth-chip ' + (d.three_legged ? 'auth-ok' : 'auth-miss');
      document.getElementById('login-btn').style.display = d.three_legged ? 'none' : 'inline-block';
      document.getElementById('logout-btn').style.display = d.three_legged ? 'inline-block' : 'none';
      if (d.three_legged) document.getElementById('auth-url-wrap').style.display = 'none';
    } catch(_) {}
  }

  async function triggerLogout() {
    const btn = document.getElementById('logout-btn');
    btn.disabled = true; btn.textContent = 'Logging out…';
    try {
      const r = await fetch('/auth/logout?token=' + encodeURIComponent(TOKEN), { method: 'POST' });
      if (!r.ok) { const e = await r.json().catch(() => ({})); alert('Logout failed: ' + (e.detail || r.status)); }
    } catch(_) { alert('Request failed'); }
    finally { btn.disabled = false; btn.textContent = 'Logout'; loadAuth(); }
  }

  async function triggerLogin() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Starting…';
    try {
      const r = await fetch('/auth/login?token=' + encodeURIComponent(TOKEN), { method: 'POST' });
      if (r.status === 409) { alert('Login already in progress'); btn.disabled = false; btn.textContent = 'Login device code'; return; }
      if (!r.ok) { alert('Failed to start login'); btn.disabled = false; btn.textContent = 'Login device code'; return; }
      btn.textContent = 'Waiting…';
      document.getElementById('auth-url-wrap').style.display = 'none';
      switchTab('log');
      const es = new EventSource('/stream/auth?token=' + encodeURIComponent(TOKEN));
      es.onmessage = function(e) {
        if (e.data === '__done__') { es.close(); btn.disabled = false; btn.textContent = 'Login device code'; loadAuth(); }
        else {
          appendLog(e.data);
          const m = e.data.match(/https?:\/\/\S+\?[^\s]+/);
          if (m) {
            const url = m[0].replace(/[.,;]$/, '');
            document.getElementById('auth-url-link').href = url;
            document.getElementById('auth-url-link').textContent = url;
            document.getElementById('auth-url-wrap').style.display = 'flex';
          }
        }
      };
      es.onerror = function() { es.close(); btn.disabled = false; btn.textContent = 'Login device code'; loadAuth(); };
    } catch(_) { btn.disabled = false; btn.textContent = 'Login device code'; }
  }

  // ── Data ────────────────────────────────────────────────────────────────────
  function applyData(data) {
    rows = data.rows || [];
    updateMeta(data.meta || {});
    populateSections();
    renderTable();
  }

  function updateMeta(meta) {
    const el = document.getElementById('meta');
    if (!meta.created) { el.textContent = 'No run data'; return; }
    const d = new Date(meta.created * 1000).toLocaleString();
    const s = meta.summary || {};
    el.textContent = d + '  ·  ' + (s.passed||0) + ' passed  ' + (s.failed||0) + ' failed  ' + (s.skipped||0) + ' skipped  ' + (meta.duration||0).toFixed(1) + 's';
  }

  function populateSections() {
    const sel = document.getElementById('f-section');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All sections</option>';
    [...new Set(rows.map(r => r.section).filter(Boolean))].sort().forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      if (s === cur) o.selected = true;
      sel.appendChild(o);
    });
  }

  // ── Table ───────────────────────────────────────────────────────────────────
  function renderTable() {
    const sec   = document.getElementById('f-section').value;
    const st    = document.getElementById('f-status').value;
    const marks = [...document.querySelectorAll('#filters input[type=checkbox]:checked')].map(c => c.value);

    const filtered = rows.filter(r => {
      if (sec && r.section !== sec) return false;
      if (st  && r.outcome !== st)  return false;
      if (marks.length && !marks.every(m => (r.marks||[]).includes(m))) return false;
      return true;
    });

    document.getElementById('tab-badge').textContent = filtered.length;
    document.getElementById('summary-line').textContent =
      filtered.length + ' of ' + rows.length + ' tests';

    function grp(r) {
      const p = (r.command || '').trim().split(/\s+/);
      return p.length >= 2 ? p[0] + ' ' + p[1] : (p[0] || r.section || '');
    }
    const sorted = [...filtered].sort((a, b) => {
      // Sort by section first, then by SR-ID number
      const secCmp = (a.section||'').localeCompare(b.section||'');
      if (secCmp !== 0) return secCmp;
      const numA = parseInt((a.id||'').replace(/\D/g,''), 10) || 0;
      const numB = parseInt((b.id||'').replace(/\D/g,''), 10) || 0;
      return numA - numB;
    });

    let html = '';
    let lastSection = null;
    for (const r of sorted) {
      const section = r.section || '';
      if (section !== lastSection) {
        html += `<tr class="group-sep"><td colspan="6"><span class="group-label">${esc(section)}</span></td></tr>`;
        lastSection = section;
      }
      const detailId = 'dr-' + esc(r.id.replace(/[^a-z0-9]/gi,'-'));
      const hasOut = !!r.output;
      const detailCls = r.outcome === 'failed' || r.outcome === 'error' ? 'fail'
                      : r.outcome === 'skipped' ? 'skip' : '';
      const arrowHtml = hasOut ? `<span class="expand-arrow" id="arr-${esc(r.id.replace(/[^a-z0-9]/gi,'-'))}">▶</span>` : '';
      html +=
        `<tr class="data-row${hasOut ? ' has-out' : ''}" data-id="${esc(r.id)}"` +
        (hasOut ? ` onclick="toggleDetail('${detailId}','${esc(r.id.replace(/[^a-z0-9]/gi,'-'))}')"` : '') + `>` +
        `<td><div class="cell-id">${arrowHtml}<span>${esc(r.id)}</span></div></td>` +
        `<td class="cell-cmd">${esc(r.command)}</td>` +
        `<td class="col-section cell-section">${esc(r.section)}</td>` +
        `<td class="col-marks">${(r.marks||[]).map(m => `<span class="cell-mark">${esc(m)}</span>`).join('')}</td>` +
        `<td id="st-${esc(r.id.replace(/[^a-z0-9]/gi,'-'))}">${statusBadge(r.outcome)}</td>` +
        `<td class="col-dur cell-dur">${r.duration != null ? r.duration.toFixed(1)+'s' : ''}</td>` +
        `</tr>` +
        (hasOut ? `<tr class="detail-row" id="${detailId}" style="display:none"><td colspan="6"><div class="detail-body ${detailCls}">${esc(r.output)}</div></td></tr>` : '');
    }
    document.getElementById('tbody').innerHTML = html;
  }

  function toggleDetail(detailId, idSlug) {
    const row = document.getElementById(detailId);
    if (!row) return;
    const open = row.style.display !== 'none';
    row.style.display = open ? 'none' : 'table-row';
    const arr = document.getElementById('arr-' + idSlug);
    if (arr) arr.classList.toggle('open', !open);
  }

  // ── Live row update (no full re-render) ─────────────────────────────────────
  function liveUpdateRow(srId, outcome) {
    // Update in-memory
    const row = rows.find(r => r.id === srId);
    if (row) row.outcome = outcome;
    // Update DOM directly (avoids scroll reset)
    const slug = srId.replace(/[^a-z0-9]/gi, '-');
    const cell = document.getElementById('st-' + slug);
    if (cell) {
      cell.innerHTML = statusBadge(outcome);
      return; // already in DOM, done
    }
    // Not in DOM yet (filtered out) — schedule a full re-render
    scheduleRender();
  }

  // ── Progress ────────────────────────────────────────────────────────────────
  function updateProgress(passed, failed, skipped, done, total, current) {
    document.getElementById('ps-passed').textContent = passed;
    document.getElementById('ps-failed').textContent = failed;
    document.getElementById('ps-skipped').textContent = skipped;
    const pct = total > 0 ? Math.min(100, Math.round(done / total * 100)) : 0;
    document.getElementById('prog-pct').textContent = pct + '% (' + done + '/' + total + ')';
    const fill = document.getElementById('progress-fill');
    fill.style.width = pct + '%';
    fill.classList.toggle('has-fail', failed > 0);
    document.getElementById('prog-current').textContent = current || '';
  }

  // ── Run ─────────────────────────────────────────────────────────────────────
  function setRunning(yes) {
    const btn = document.getElementById('run-btn');
    const abt = document.getElementById('abort-btn');
    btn.disabled = yes;
    btn.textContent = yes ? 'Running…' : 'Run Tests';
    abt.style.display = yes ? 'inline-block' : 'none';
  }

  function triggerRun() {
    setRunning(true);
    clearLog();
    // Reset all rows to "not run" so the table shows the current run, not the previous one
    rows.forEach(r => r.outcome = 'not run');
    renderTable();
    updateProgress(0, 0, 0, 0, 295, null);
    document.getElementById('progress-panel').style.display = 'block';
    openRunWs('/ws/run');
  }

  function reconnectToRun() {
    setRunning(true);
    document.getElementById('progress-panel').style.display = 'block';
    openRunWs('/ws/stream');
  }

  function openRunWs(path) {
    if (_activeWs) { try { _activeWs.close(); } catch(_){} _activeWs = null; }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(proto + '//' + location.host + path + '?token=' + encodeURIComponent(TOKEN));
    _activeWs = ws;
    let done = false;

    function finish() {
      if (done) return; done = true;
      _activeWs = null;
      setRunning(false);
    }

    ws.onmessage = function(e) {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log') {
        appendLogLine(msg.text);
      } else if (msg.type === 'progress') {
        updateProgress(msg.passed, msg.failed, msg.skipped, msg.done, msg.total, msg.current);
        if (msg.sr_id && msg.outcome) {
          liveUpdateRow(msg.sr_id, msg.outcome);
        }
      } else if (msg.type === 'error') {
        finish();
        document.getElementById('progress-panel').style.display = 'none';
        alert('Run error: ' + msg.text);
      } else if (msg.type === 'done') {
        updateProgress(msg.passed, msg.failed, msg.skipped, msg.passed + msg.failed + msg.skipped, 295, null);
        finish();
        loadResults().then(() => switchTab('results'));
        setTimeout(() => { document.getElementById('progress-panel').style.display = 'none'; }, 3000);
      }
    };
    ws.onerror = function() { finish(); };
    ws.onclose = function() { finish(); };
  }

  async function abortRun() {
    await fetch('/run/abort?token=' + encodeURIComponent(TOKEN), { method: 'POST' }).catch(()=>{});
  }

  // ── Log tab ─────────────────────────────────────────────────────────────────
  function appendLog(text) {
    text.split('\n').forEach(line => appendLogLine(line));
  }

  function appendLogLine(text) {
    const el = document.getElementById('log-scroll');
    const span = document.createElement('span');
    if (/PASSED/.test(text)) span.className = 'log-pass';
    else if (/FAILED|ERROR/.test(text)) span.className = 'log-fail';
    else if (/SKIPPED/.test(text)) span.className = 'log-skip';
    else if (/^={3,}|^-{3,}/.test(text.trim())) span.className = 'log-head';
    span.textContent = text + '\n';
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  function clearLog() {
    document.getElementById('log-scroll').textContent = '';
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  function switchTab(name) {
    document.getElementById('pane-results').style.display = name === 'results' ? 'flex' : 'none';
    document.getElementById('pane-log').style.display     = name === 'log'     ? 'flex' : 'none';
    document.getElementById('pane-graph').style.display   = name === 'graph'   ? 'flex' : 'none';
    const tabs = document.querySelectorAll('.tab');
    const tabMap = ['results', 'log', 'graph'];
    tabs.forEach((b, i) => b.classList.toggle('active', tabMap[i] === name));
    if (name === 'graph' && !_graphLoaded) loadGraph();
  }

  // ── Enter key on token input ─────────────────────────────────────────────────
  document.getElementById('token-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitToken();
  });

  // ── Command Graph ─────────────────────────────────────────────────────────
  let _graphLoaded = false;
  let _graphNodes = [];
  let _graphEdges = [];
  let _graphAnim = null;
  let _graphTransform = { x: 0, y: 0, scale: 1 };
  let _dragNode = null;
  let _panStart = null;
  let _hoveredNode = null;
  let _selectedNode = null;
  let _graphCmds = {};       // full API response for info panel
  let _graphSearchTerm = '';  // current fuzzy search query
  let _graphSearchHits = new Set(); // node IDs matching search

  const GRAPH_COLORS = {
    root:  '#4f8ef7',
    auth:  '#9b72f7', bucket: '#2dd68c', object: '#2dd68c', translate: '#f0a020',
    hub:   '#4f8ef7', project:'#4f8ef7', folder: '#4f8ef7', item:    '#4f8ef7',
    webhook:'#f2506a', da:    '#f0a020', issue:  '#f2506a', acc:     '#f2506a',
    admin: '#ff6b9d', api:   '#5ac8fa', rfi:    '#f2506a', report:  '#c9d1e0',
    template:'#c9d1e0', reality:'#f0a020', inspect:'#5ac8fa', plugin: '#9b72f7',
    config:'#c9d1e0', pipeline:'#2dd68c', snapshot:'#5ac8fa', doctor:'#2dd68c',
    cache: '#c9d1e0', sync:  '#5ac8fa', schema: '#c9d1e0', marketplace:'#9b72f7',
    init:  '#4f8ef7', status:'#4f8ef7', generate:'#c9d1e0', demo:   '#c9d1e0',
    lint:  '#2dd68c', job:   '#f0a020', workflow:'#f0a020', shell:  '#c9d1e0',
    mcp:   '#9b72f7', docs:  '#c9d1e0', logs:   '#c9d1e0', watch:  '#5ac8fa',
    completions:'#c9d1e0', man: '#c9d1e0', history:'#c9d1e0', replay:'#c9d1e0',
    stats: '#c9d1e0', swarm: '#9b72f7',
  };

  // Category groups for radial layout
  const CMD_GROUPS = {
    'Data Management': ['hub','project','folder','item'],
    'Object Storage':  ['bucket','object'],
    'Model Derivative':['translate'],
    'Design Automation':['da','job','pipeline','workflow'],
    'ACC':             ['issue','rfi','acc','report'],
    'Admin':           ['admin'],
    'Auth & Config':   ['auth','config','init','status','doctor'],
    'Developer Tools': ['api','inspect','schema','plugin','marketplace','mcp','shell','completions'],
    'Operations':      ['cache','sync','snapshot','logs','watch','lint','generate','demo','template','reality','webhook','docs','man','history','replay','stats','swarm'],
  };

  async function loadGraph() {
    _graphLoaded = true;
    try {
      const r = await fetch('/api/commands?token=' + encodeURIComponent(TOKEN));
      if (!r.ok) return;
      const data = await r.json();
      buildGraph(data.commands);
    } catch(e) { console.error('Graph load failed', e); }
  }

  function buildGraph(commands) {
    _graphNodes = [];
    _graphEdges = [];
    _graphCmds = commands;

    const canvas = document.getElementById('graph-canvas');
    const W = canvas.parentElement.clientWidth;
    const H = canvas.parentElement.clientHeight - 36; // toolbar
    const cx = W / 2, cy = H / 2;

    // Root node
    _graphNodes.push({ id: 'raps', label: 'raps', x: cx, y: cy, vx: 0, vy: 0,
      r: 22, color: GRAPH_COLORS.root, depth: 0, pinned: true, mass: 3 });

    // Assign angle ranges per group
    const groupKeys = Object.keys(CMD_GROUPS);
    const angleStep = (2 * Math.PI) / groupKeys.length;
    let cmdAngle = {};
    groupKeys.forEach((g, gi) => {
      const cmds = CMD_GROUPS[g];
      const baseAngle = gi * angleStep - Math.PI / 2;
      cmds.forEach((c, ci) => {
        cmdAngle[c] = baseAngle + (ci / cmds.length) * angleStep;
      });
    });

    // Top-level command nodes — commands[cmd] = { desc, subs: {name: {desc}}, options: [...] }
    const cmdKeys = Object.keys(commands).filter(c => c !== 'help');
    const radius1 = Math.min(W, H) * 0.28;
    cmdKeys.forEach((cmd, i) => {
      const info = commands[cmd] || {};
      const subNames = Object.keys(info.subs || {});
      const angle = cmdAngle[cmd] ?? (i / cmdKeys.length) * 2 * Math.PI;
      const x = cx + Math.cos(angle) * radius1 + (Math.random() - 0.5) * 20;
      const y = cy + Math.sin(angle) * radius1 + (Math.random() - 0.5) * 20;
      const r = Math.max(8, Math.min(16, 8 + subNames.length * 0.6));
      _graphNodes.push({ id: cmd, label: cmd, x, y, vx: 0, vy: 0,
        r, color: GRAPH_COLORS[cmd] || '#5a6680', depth: 1, pinned: false,
        mass: 1 + subNames.length * 0.2, parent: 'raps', subCount: subNames.length,
        desc: info.desc || '' });
      _graphEdges.push({ source: 'raps', target: cmd });

      // Subcommand nodes
      const radius2 = 55 + subNames.length * 4;
      subNames.forEach((sub, si) => {
        const sa = angle + ((si / subNames.length) - 0.5) * (Math.PI * 0.4);
        const sx = x + Math.cos(sa) * radius2 + (Math.random() - 0.5) * 10;
        const sy = y + Math.sin(sa) * radius2 + (Math.random() - 0.5) * 10;
        const nodeId = cmd + '.' + sub;
        const subDesc = (info.subs[sub] || {}).desc || '';
        _graphNodes.push({ id: nodeId, label: sub, x: sx, y: sy, vx: 0, vy: 0,
          r: 4, color: GRAPH_COLORS[cmd] || '#5a6680', depth: 2, pinned: false, mass: 0.5,
          parent: cmd, desc: subDesc });
        _graphEdges.push({ source: cmd, target: nodeId });
      });
    });

    // Build lookup
    _graphNodes._map = {};
    _graphNodes.forEach(n => _graphNodes._map[n.id] = n);

    initGraphCanvas();
  }

  function initGraphCanvas() {
    const canvas = document.getElementById('graph-canvas');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = container.clientWidth * dpr;
    canvas.height = (container.clientHeight - 36) * dpr;
    canvas.style.width = container.clientWidth + 'px';
    canvas.style.height = (container.clientHeight - 36) + 'px';

    _graphTransform = { x: 0, y: 0, scale: 1 };

    // Mouse events
    canvas.onmousedown = graphMouseDown;
    canvas.onmousemove = graphMouseMove;
    canvas.onmouseup = graphMouseUp;
    canvas.onwheel = graphWheel;
    canvas.ondblclick = graphDblClick;

    // Touch events
    canvas.ontouchstart = graphTouchStart;
    canvas.ontouchmove = graphTouchMove;
    canvas.ontouchend = graphTouchEnd;

    // Start simulation
    if (_graphAnim) cancelAnimationFrame(_graphAnim);
    tickGraph();
  }

  function tickGraph() {
    simulateForces();
    drawGraph();
    _graphAnim = requestAnimationFrame(tickGraph);
  }

  function simulateForces() {
    const nodes = _graphNodes;
    const edges = _graphEdges;
    const map = nodes._map;
    const damping = 0.92;
    const repulsion = 800;
    const attraction = 0.008;
    const idealLen = { 0: 0, 1: 160, 2: 60 };

    // Repulsion (all pairs, chunked for perf)
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      if (a.pinned) continue;
      for (let j = i + 1; j < nodes.length; j++) {
        const b = nodes[j];
        let dx = a.x - b.x, dy = a.y - b.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        // Stronger repulsion for same-depth nodes
        let rep = repulsion / (dist * dist);
        if (a.depth === b.depth) rep *= 1.5;
        if (dist < 30) rep *= 3;
        const fx = (dx / dist) * rep;
        const fy = (dy / dist) * rep;
        if (!a.pinned) { a.vx += fx / a.mass; a.vy += fy / a.mass; }
        if (!b.pinned) { b.vx -= fx / b.mass; b.vy -= fy / b.mass; }
      }
    }

    // Attraction along edges
    for (const e of edges) {
      const a = map[e.source], b = map[e.target];
      if (!a || !b) continue;
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const target = idealLen[b.depth] || 80;
      const force = (dist - target) * attraction;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      if (!a.pinned) { a.vx += fx; a.vy += fy; }
      if (!b.pinned) { b.vx -= fx; b.vy -= fy; }
    }

    // Center gravity
    const canvas = document.getElementById('graph-canvas');
    const dpr = window.devicePixelRatio || 1;
    const cxc = canvas.width / dpr / 2, cyc = canvas.height / dpr / 2;
    for (const n of nodes) {
      if (n.pinned) continue;
      n.vx += (cxc - n.x) * 0.0003;
      n.vy += (cyc - n.y) * 0.0003;
      n.vx *= damping;
      n.vy *= damping;
      n.x += n.vx;
      n.y += n.vy;
    }
  }

  function drawGraph() {
    const canvas = document.getElementById('graph-canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.width / dpr, H = canvas.height / dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    ctx.translate(_graphTransform.x, _graphTransform.y);
    ctx.scale(_graphTransform.scale, _graphTransform.scale);

    const map = _graphNodes._map;
    const selId = _selectedNode;
    const hovId = _hoveredNode;

    // Connected set for highlighting (selection)
    let connSet = null;
    if (selId) {
      connSet = new Set([selId]);
      _graphEdges.forEach(e => {
        if (e.source === selId) connSet.add(e.target);
        if (e.target === selId) connSet.add(e.source);
      });
    }

    // Search filter
    const searching = _graphSearchTerm && _graphSearchHits.size > 0;

    // Edges
    for (const e of _graphEdges) {
      const a = map[e.source], b = map[e.target];
      if (!a || !b) continue;
      const dimmedSel = connSet && !connSet.has(e.source) && !connSet.has(e.target);
      const dimmedSearch = searching && !_graphSearchHits.has(e.source) && !_graphSearchHits.has(e.target);
      const dimmed = dimmedSel || dimmedSearch;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = dimmed ? 'rgba(28,33,48,0.4)' : 'rgba(44,52,74,0.6)';
      ctx.lineWidth = b.depth === 2 ? 0.5 : 1;
      ctx.stroke();
    }

    // Nodes
    for (const n of _graphNodes) {
      const dimmedSel = connSet && !connSet.has(n.id);
      const dimmedSearch = searching && !_graphSearchHits.has(n.id);
      const dimmed = dimmedSel || dimmedSearch;
      const hovered = n.id === hovId;
      const selected = n.id === selId;
      const searchHit = searching && _graphSearchHits.has(n.id) && !dimmedSel;

      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);

      if (dimmed) {
        ctx.fillStyle = 'rgba(30,36,50,0.5)';
      } else if (selected) {
        ctx.fillStyle = n.color;
        ctx.shadowColor = n.color;
        ctx.shadowBlur = 12;
      } else if (hovered) {
        ctx.fillStyle = n.color;
        ctx.shadowColor = n.color;
        ctx.shadowBlur = 8;
      } else if (searchHit) {
        ctx.fillStyle = n.color;
        ctx.shadowColor = n.color;
        ctx.shadowBlur = 6;
      } else {
        const alpha = n.depth === 2 ? '80' : 'cc';
        ctx.fillStyle = n.color + alpha;
      }
      ctx.fill();
      ctx.shadowBlur = 0;

      // Label
      if (n.depth <= 1 || hovered || selected || searchHit || (_graphTransform.scale > 1.5 && !dimmed)) {
        ctx.font = n.depth === 0 ? 'bold 13px JetBrains Mono'
                 : n.depth === 1 ? '500 10px JetBrains Mono'
                 : '9px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const ly = n.y + n.r + (n.depth === 0 ? 16 : n.depth === 1 ? 12 : 8);
        ctx.fillStyle = dimmed ? 'rgba(90,102,128,0.3)'
                      : (selected || hovered) ? '#fff'
                      : n.depth === 2 ? 'rgba(201,209,224,0.5)' : 'rgba(201,209,224,0.8)';
        ctx.fillText(n.label, n.x, ly);

        // Show subcommand count for depth-1 nodes
        if (n.depth === 1 && n.subCount > 0 && !dimmed) {
          ctx.font = '8px JetBrains Mono';
          ctx.fillStyle = 'rgba(90,102,128,0.6)';
          ctx.fillText(n.subCount + ' sub', n.x, ly + 11);
        }
      }
    }

    ctx.restore();
  }

  // ── Graph interaction ──────────────────────────────────────────────────────
  function graphToWorld(ex, ey) {
    const canvas = document.getElementById('graph-canvas');
    const rect = canvas.getBoundingClientRect();
    const cx = ex - rect.left, cy = ey - rect.top;
    return {
      x: (cx - _graphTransform.x) / _graphTransform.scale,
      y: (cy - _graphTransform.y) / _graphTransform.scale
    };
  }

  function findNodeAt(wx, wy) {
    for (let i = _graphNodes.length - 1; i >= 0; i--) {
      const n = _graphNodes[i];
      const dx = wx - n.x, dy = wy - n.y;
      const hitR = Math.max(n.r, 8);
      if (dx * dx + dy * dy <= hitR * hitR) return n;
    }
    return null;
  }

  function graphMouseDown(e) {
    const w = graphToWorld(e.clientX, e.clientY);
    const node = findNodeAt(w.x, w.y);
    if (node && node.depth > 0) {
      _dragNode = node;
      _dragNode._wasPinned = _dragNode.pinned;
      _dragNode.pinned = true;
      document.getElementById('graph-canvas').classList.add('dragging');
    } else {
      _panStart = { mx: e.clientX, my: e.clientY, tx: _graphTransform.x, ty: _graphTransform.y };
    }
  }

  function graphMouseMove(e) {
    const canvas = document.getElementById('graph-canvas');
    const w = graphToWorld(e.clientX, e.clientY);
    if (_dragNode) {
      _dragNode.x = w.x;
      _dragNode.y = w.y;
      _dragNode.vx = 0;
      _dragNode.vy = 0;
    } else if (_panStart) {
      _graphTransform.x = _panStart.tx + (e.clientX - _panStart.mx);
      _graphTransform.y = _panStart.ty + (e.clientY - _panStart.my);
      canvas.classList.add('dragging');
    } else {
      const node = findNodeAt(w.x, w.y);
      _hoveredNode = node ? node.id : null;
      canvas.style.cursor = node ? 'pointer' : 'grab';

      const tip = document.getElementById('graph-tooltip');
      if (node && node.depth >= 1) {
        const fullCmd = node.parent ? 'raps ' + node.parent + ' ' + node.label : 'raps ' + node.label;
        tip.textContent = fullCmd + (node.subCount ? ' (' + node.subCount + ' subcommands)' : '');
        const rect = canvas.getBoundingClientRect();
        tip.style.left = (e.clientX - rect.left + 12) + 'px';
        tip.style.top = (e.clientY - rect.top - 8) + 'px';
        tip.style.display = 'block';
      } else {
        tip.style.display = 'none';
      }
    }
  }

  function graphMouseUp(e) {
    if (_dragNode) {
      _dragNode.pinned = _dragNode._wasPinned || false;
      _dragNode = null;
    }
    _panStart = null;
    document.getElementById('graph-canvas').classList.remove('dragging');

    // Click to select
    const w = graphToWorld(e.clientX, e.clientY);
    const node = findNodeAt(w.x, w.y);
    _selectedNode = (node && node.id !== _selectedNode) ? node.id : null;
    updateInfoPanel(_selectedNode);
  }

  function graphWheel(e) {
    e.preventDefault();
    const canvas = document.getElementById('graph-canvas');
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const zoom = e.deltaY < 0 ? 1.1 : 0.9;
    const newScale = Math.max(0.2, Math.min(5, _graphTransform.scale * zoom));
    const ratio = newScale / _graphTransform.scale;
    _graphTransform.x = mx - (mx - _graphTransform.x) * ratio;
    _graphTransform.y = my - (my - _graphTransform.y) * ratio;
    _graphTransform.scale = newScale;
  }

  function graphDblClick(e) {
    const w = graphToWorld(e.clientX, e.clientY);
    const node = findNodeAt(w.x, w.y);
    if (node) {
      node.pinned = !node.pinned;
    }
  }

  // Touch support
  let _touchId = null;
  function graphTouchStart(e) {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      _touchId = t.identifier;
      graphMouseDown({ clientX: t.clientX, clientY: t.clientY });
    }
  }
  function graphTouchMove(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === _touchId) {
        graphMouseMove({ clientX: t.clientX, clientY: t.clientY });
      }
    }
  }
  function graphTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === _touchId) {
        graphMouseUp({ clientX: t.clientX, clientY: t.clientY });
        _touchId = null;
      }
    }
  }

  // ── Info panel ────────────────────────────────────────────────────────────
  function updateInfoPanel(nodeId) {
    const empty = document.getElementById('graph-info-empty');
    const content = document.getElementById('graph-info-content');
    if (!nodeId) {
      empty.style.display = 'flex';
      content.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    content.style.display = 'block';

    const node = _graphNodes._map[nodeId];
    if (!node) return;

    // Header
    const fullCmd = node.depth === 0 ? 'raps'
      : node.depth === 1 ? 'raps ' + node.label
      : 'raps ' + node.parent + ' ' + node.label;
    document.getElementById('gi-cmd').textContent = fullCmd;
    const badge = document.getElementById('gi-depth');
    badge.textContent = node.depth === 0 ? 'root' : node.depth === 1 ? 'command' : 'subcommand';
    badge.style.background = node.color + '22';
    badge.style.color = node.color;

    // Description
    const descEl = document.getElementById('gi-desc');
    descEl.textContent = node.desc || 'No description available';

    // Subcommands section
    const subsSection = document.getElementById('gi-subs-section');
    const subsEl = document.getElementById('gi-subs');
    subsEl.innerHTML = '';

    let subEntries = [];
    if (node.depth === 0) {
      // Root: show top-level commands
      subEntries = Object.entries(_graphCmds).map(([name, info]) => ({ name, desc: info.desc || '' }));
    } else if (node.depth === 1 && _graphCmds[node.id]) {
      // Command: show its subcommands
      subEntries = Object.entries(_graphCmds[node.id].subs || {}).map(([name, info]) => ({ name, desc: info.desc || '' }));
    }
    // depth 2: no sub-sub-commands

    if (subEntries.length > 0) {
      subsSection.style.display = 'block';
      subEntries.forEach(s => {
        const div = document.createElement('div');
        div.className = 'gi-sub-item';
        div.innerHTML = '<span class="gi-sub-name">' + escHtml(s.name) + '</span>'
          + '<span class="gi-sub-desc">' + escHtml(s.desc) + '</span>';
        // Click to navigate to that node
        const targetId = node.depth === 0 ? s.name : node.id + '.' + s.name;
        div.onclick = () => {
          _selectedNode = targetId;
          updateInfoPanel(targetId);
          // Pan to node
          const target = _graphNodes._map[targetId];
          if (target) {
            const canvas = document.getElementById('graph-canvas');
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr / 2, ch = canvas.height / dpr / 2;
            _graphTransform.x = cw - target.x * _graphTransform.scale;
            _graphTransform.y = ch - target.y * _graphTransform.scale;
          }
        };
        subsEl.appendChild(div);
      });
    } else {
      subsSection.style.display = 'none';
    }

    // Options section
    const optsSection = document.getElementById('gi-opts-section');
    const optsEl = document.getElementById('gi-opts');
    optsEl.innerHTML = '';

    let options = [];
    if (node.depth === 1 && _graphCmds[node.id]) {
      options = _graphCmds[node.id].options || [];
    }

    if (options.length > 0) {
      optsSection.style.display = 'block';
      options.forEach(o => {
        const div = document.createElement('div');
        div.className = 'gi-opt-item';
        div.innerHTML = '<div class="gi-opt-flag">' + escHtml(o.flag) + '</div>'
          + (o.desc ? '<div class="gi-opt-desc">' + escHtml(o.desc) + '</div>' : '');
        optsEl.appendChild(div);
      });
    } else {
      optsSection.style.display = 'none';
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Fuzzy search ─────────────────────────────────────────────────────────
  function fuzzyMatch(query, text) {
    query = query.toLowerCase();
    text = text.toLowerCase();
    if (!query) return true;
    // Simple subsequence match with scoring
    let qi = 0;
    for (let ti = 0; ti < text.length && qi < query.length; ti++) {
      if (text[ti] === query[qi]) qi++;
    }
    return qi === query.length;
  }

  function applyGraphSearch(term) {
    _graphSearchTerm = (term || '').trim();
    _graphSearchHits.clear();
    if (!_graphSearchTerm) return;

    for (const n of _graphNodes) {
      if (n.depth === 0) continue;
      // Match against label, full command path, and description
      const fullCmd = n.parent && n.parent !== 'raps'
        ? n.parent + ' ' + n.label
        : n.label;
      if (fuzzyMatch(_graphSearchTerm, n.label)
        || fuzzyMatch(_graphSearchTerm, fullCmd)
        || fuzzyMatch(_graphSearchTerm, n.desc || '')) {
        _graphSearchHits.add(n.id);
        // Also include parent so edges stay visible
        if (n.parent) _graphSearchHits.add(n.parent);
        if (n.parent === 'raps') _graphSearchHits.add('raps');
      }
    }
    // Always include root if we have any hits
    if (_graphSearchHits.size > 0) _graphSearchHits.add('raps');
  }

  document.getElementById('graph-search').addEventListener('input', function(e) {
    applyGraphSearch(e.target.value);
  });

  function resetGraph() {
    _graphTransform = { x: 0, y: 0, scale: 1 };
    _selectedNode = null;
    _graphSearchTerm = '';
    _graphSearchHits.clear();
    document.getElementById('graph-search').value = '';
    updateInfoPanel(null);
    _graphNodes.forEach(n => { n.pinned = n.depth === 0; });
    _graphLoaded = false;
    loadGraph();
  }

  // Handle resize
  window.addEventListener('resize', () => {
    if (document.getElementById('pane-graph').style.display !== 'none' && _graphLoaded) {
      initGraphCanvas();
    }
  });
</script>
</body>
