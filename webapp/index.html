<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAPS · Test Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080a0f;
      --surface:  #0e1117;
      --panel:    #12161e;
      --border:   #1c2130;
      --border2:  #232a3a;
      --text:     #c9d1e0;
      --text2:    #5a6680;
      --text3:    #2d3448;
      --accent:   #4f8ef7;
      --green:    #2dd68c;
      --red:      #f2506a;
      --yellow:   #f0a020;
      --purple:   #9b72f7;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px;
    }

    /* ─── Token Gate ─── */
    #token-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 0;
      background: var(--bg);
    }
    .gate-logo {
      font-family: var(--sans);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 4px;
    }
    .gate-logo span { color: var(--accent); }
    .gate-sub {
      font-size: 0.72rem;
      color: var(--text2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 28px 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .gate-label {
      font-size: 0.7rem;
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #token-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #token-input:focus { border-color: var(--accent); }
    .gate-btn {
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .gate-btn:hover { opacity: 0.88; }
    #token-error { color: var(--red); font-size: 0.75rem; display: none; }

    /* ─── App shell ─── */
    #app { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }

    /* ─── Top header ─── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #fff;
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }
    .logo-sep {
      width: 1px;
      height: 20px;
      background: var(--border2);
      flex-shrink: 0;
    }
    #meta {
      font-size: 0.72rem;
      color: var(--text2);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hdr-actions { display: flex; align-items: center; gap: 8px; }
    #run-btn {
      padding: 7px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    #run-btn:disabled { background: var(--border2); color: var(--text2); cursor: not-allowed; }
    #run-btn:hover:not(:disabled) { opacity: 0.85; }
    #abort-btn {
      padding: 7px 14px;
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(242,80,106,0.35);
      border-radius: 5px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: none;
      transition: background 0.15s;
    }
    #abort-btn:hover { background: rgba(242,80,106,0.1); }

    /* ─── Auth bar ─── */
    #auth-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .auth-label { font-size: 0.65rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
    .auth-chip {
      padding: 3px 9px;
      border-radius: 3px;
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
    }
    .auth-ok  { color: var(--green); border-color: rgba(45,214,140,0.25); background: rgba(45,214,140,0.07); }
    .auth-miss { color: var(--text2); border-color: var(--border2); background: transparent; }
    #login-btn, #logout-btn {
      padding: 4px 12px;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #login-btn {
      background: rgba(155,114,247,0.15);
      color: var(--purple);
      border: 1px solid rgba(155,114,247,0.3);
      display: none;
    }
    #login-btn:hover:not(:disabled) { opacity: 0.8; }
    #login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #logout-btn {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
      display: none;
    }
    #logout-btn:hover:not(:disabled) { color: var(--text); }
    #logout-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #auth-url-wrap {
      display: none;
      width: 100%;
      align-items: center;
      gap: 8px;
      background: rgba(79,142,247,0.07);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 4px;
      padding: 7px 12px;
      margin-top: 2px;
      flex-wrap: wrap;
    }
    #auth-url-wrap .aw-label { font-size: 0.68rem; color: var(--text2); white-space: nowrap; }
    #auth-url-link {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      flex: 1;
    }
    #auth-url-link:hover { text-decoration: underline; }
    #auth-url-dismiss {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 4px;
    }

    /* ─── Progress panel ─── */
    #progress-panel {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px 12px;
      flex-shrink: 0;
      display: none;
    }
    #progress-track {
      height: 2px;
      background: var(--border2);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.4s ease, background 0.3s;
    }
    #progress-fill.has-fail { background: var(--red); }
    #progress-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .pstat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
    }
    .pstat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ps-pass .pstat-dot { background: var(--green); }
    .ps-fail .pstat-dot { background: var(--red); }
    .ps-skip .pstat-dot { background: var(--text2); }
    .pstat-val { font-weight: 500; }
    .ps-pass .pstat-val { color: var(--green); }
    .ps-fail .pstat-val { color: var(--red); }
    .ps-skip .pstat-val { color: var(--text2); }
    #prog-pct { color: var(--text2); font-size: 0.7rem; margin-left: 4px; }
    #prog-current {
      font-size: 0.68rem;
      color: var(--text3);
      margin-left: auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 320px;
    }

    /* ─── Tab bar ─── */
    #tab-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      padding: 0 20px;
      gap: 0;
    }
    .tab {
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    #tab-badge {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(79,142,247,0.15);
      color: var(--accent);
      border-radius: 3px;
      font-size: 0.65rem;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ─── Results tab ─── */
    #pane-results {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    #filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .fsel {
      background: var(--panel);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 4px;
      padding: 5px 8px;
      font-family: var(--mono);
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
    }
    .fsel:focus { border-color: var(--accent); }
    .fcheck {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }
    .fcheck input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
    #summary-line {
      padding: 5px 20px;
      font-size: 0.68rem;
      color: var(--text3);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .table-scroll { flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--surface);
      text-align: left;
      padding: 8px 12px;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border2);
      white-space: nowrap;
    }
    td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr.data-row:hover td { background: rgba(255,255,255,0.02); }
    tr.data-row.has-out { cursor: pointer; }
    tr.group-sep td {
      padding: 10px 12px 4px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .group-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    tr.detail-row td { padding: 0; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border2); }
    .detail-body {
      padding: 10px 12px 12px 28px;
      font-size: 0.72rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 280px;
      overflow-y: auto;
      color: var(--text2);
    }
    .detail-body.fail { color: #ff8090; }
    .detail-body.skip { color: var(--text2); font-style: italic; }

    /* Status badges */
    .st {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .st-dot { width: 5px; height: 5px; border-radius: 50%; }
    .st-passed  { color: var(--green); border-color: rgba(45,214,140,0.2); background: rgba(45,214,140,0.06); }
    .st-passed .st-dot  { background: var(--green); }
    .st-failed  { color: var(--red); border-color: rgba(242,80,106,0.2); background: rgba(242,80,106,0.06); }
    .st-failed .st-dot  { background: var(--red); }
    .st-skipped { color: var(--text2); border-color: var(--border2); background: transparent; }
    .st-skipped .st-dot { background: var(--text2); }
    .st-not-run { color: var(--text3); border-color: transparent; background: transparent; }
    .st-not-run .st-dot { background: var(--text3); }
    .st-error   { color: var(--yellow); border-color: rgba(240,160,32,0.2); background: rgba(240,160,32,0.06); }
    .st-error .st-dot   { background: var(--yellow); }
    .st-running { color: var(--accent); border-color: rgba(79,142,247,0.25); background: rgba(79,142,247,0.07); animation: pulse-st 1.4s ease infinite; }
    .st-running .st-dot { background: var(--accent); animation: blink-dot 1.4s ease infinite; }
    @keyframes pulse-st { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
    @keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* Table cell styles */
    .cell-id {
      font-size: 0.72rem;
      font-weight: 500;
      color: #7894c0;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .expand-arrow { font-size: 0.6rem; color: var(--text3); transition: transform 0.15s; }
    .expand-arrow.open { transform: rotate(90deg); color: var(--text2); }
    .cell-cmd { font-size: 0.72rem; color: var(--text2); word-break: break-all; max-width: 340px; }
    .cell-section { font-size: 0.68rem; color: var(--text3); white-space: nowrap; }
    .cell-mark {
      display: inline-block;
      padding: 1px 5px;
      font-size: 0.62rem;
      background: rgba(79,142,247,0.1);
      color: rgba(79,142,247,0.7);
      border-radius: 2px;
      margin-right: 3px;
    }
    .cell-dur { font-size: 0.7rem; color: var(--text3); white-space: nowrap; }

    @media (max-width: 700px) {
      .col-section, .col-marks, .col-dur { display: none; }
    }

    /* ─── Log tab ─── */
    #pane-log {
      flex: 1; display: none; flex-direction: column; min-height: 0;
    }
    #log-toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #log-clear-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
    }
    #log-clear-btn:hover { color: var(--text); border-color: var(--text2); }
    #log-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      font-size: 0.75rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      color: #7a8ca8;
    }
    #log-scroll .log-pass  { color: var(--green); }
    #log-scroll .log-fail  { color: var(--red); }
    #log-scroll .log-skip  { color: var(--text2); }
    #log-scroll .log-head  { color: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  </style>
</head>
<body>

<!-- Token gate -->
<div id="token-gate">
  <div class="gate-logo">RAPS<span>.</span></div>
  <div class="gate-sub">Test Monitor</div>
  <div class="gate-card">
    <div class="gate-label">Dashboard Token</div>
    <input id="token-input" type="password" placeholder="Enter token…" autocomplete="current-password">
    <button class="gate-btn" onclick="submitToken()">Access Dashboard</button>
    <div id="token-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="logo">RAPS<span>.</span></div>
    <div class="logo-sep"></div>
    <div id="meta">No run data</div>
    <div class="hdr-actions">
      <button id="abort-btn" onclick="abortRun()">Abort</button>
      <button id="run-btn" onclick="triggerRun()">Run Tests</button>
    </div>
  </header>

  <div id="auth-bar">
    <span class="auth-label">Auth</span>
    <span id="auth-2leg" class="auth-chip auth-miss">2-leg —</span>
    <span id="auth-3leg" class="auth-chip auth-miss">3-leg —</span>
    <button id="login-btn" onclick="triggerLogin()">Login device code</button>
    <button id="logout-btn" onclick="triggerLogout()">Logout</button>
    <div id="auth-url-wrap">
      <span class="aw-label">Open to authenticate:</span>
      <a id="auth-url-link" href="#" target="_blank" rel="noopener">···</a>
      <button id="auth-url-dismiss" onclick="document.getElementById('auth-url-wrap').style.display='none'" title="Dismiss">✕</button>
    </div>
  </div>

  <div id="progress-panel">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-stats">
      <div class="pstat ps-pass"><div class="pstat-dot"></div><span class="pstat-val" id="ps-passed">0</span><span style="color:var(--text2)">passed</span></div>
      <div class="pstat ps-fail"><div class="pstat-dot"></div><span class="pstat-val" id="ps-failed">0</span><span style="color:var(--text2)">failed</span></div>
      <div class="pstat ps-skip"><div class="pstat-dot"></div><span class="pstat-val" id="ps-skipped">0</span><span style="color:var(--text2)">skipped</span></div>
      <span id="prog-pct" style="color:var(--text2)">0%</span>
      <span id="prog-current"></span>
    </div>
  </div>

  <div id="tab-bar">
    <button class="tab active" onclick="switchTab('results')">Results <span id="tab-badge">0</span></button>
    <button class="tab" onclick="switchTab('log')">Live Log</button>
  </div>

  <div id="pane-results">
    <div id="filters">
      <select class="fsel" id="f-section" onchange="renderTable()">
        <option value="">All sections</option>
      </select>
      <select class="fsel" id="f-status" onchange="renderTable()">
        <option value="">All statuses</option>
        <option>passed</option>
        <option>failed</option>
        <option>skipped</option>
        <option>not run</option>
      </select>
      <label class="fcheck"><input type="checkbox" value="require_2leg" onchange="renderTable()"> 2-leg</label>
      <label class="fcheck"><input type="checkbox" value="require_3leg" onchange="renderTable()"> 3-leg</label>
      <label class="fcheck"><input type="checkbox" value="lifecycle" onchange="renderTable()"> lifecycle</label>
    </div>
    <div id="summary-line">—</div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:88px">SR-ID</th>
            <th>Command</th>
            <th class="col-section">Section</th>
            <th class="col-marks">Marks</th>
            <th style="width:96px">Status</th>
            <th class="col-dur" style="width:72px">Time</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="pane-log">
    <div id="log-toolbar">
      <button id="log-clear-btn" onclick="clearLog()">Clear</button>
      <span style="font-size:0.68rem;color:var(--text3)" id="log-status"></span>
    </div>
    <div id="log-scroll"></div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let TOKEN = localStorage.getItem('raps_token') || '';
  let rows = [];
  let _renderPending = false;
  let _activeWs = null;

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function scheduleRender() {
    if (_renderPending) return;
    _renderPending = true;
    requestAnimationFrame(() => { _renderPending = false; renderTable(); });
  }

  function statusClass(outcome) {
    const map = { passed: 'passed', failed: 'failed', skipped: 'skipped',
                  'not run': 'not-run', error: 'error', running: 'running' };
    return 'st-' + (map[outcome] || 'not-run');
  }
  function statusLabel(outcome) {
    if (outcome === 'not run') return '—';
    return outcome;
  }
  function statusDot(outcome) {
    return `<span class="st-dot"></span>`;
  }
  function statusBadge(outcome) {
    const cls = statusClass(outcome);
    return `<span class="st ${cls}">${statusDot(outcome)}${esc(statusLabel(outcome))}</span>`;
  }

  // ── Auth & Login ────────────────────────────────────────────────────────────
  if (TOKEN) attemptAutoLogin();

  async function attemptAutoLogin() {
    try {
      const r = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
      if (r.ok) { showApp(); applyData(await r.json()); }
      else { localStorage.removeItem('raps_token'); TOKEN = ''; }
    } catch(_) { localStorage.removeItem('raps_token'); TOKEN = ''; }
  }

  async function submitToken() {
    TOKEN = document.getElementById('token-input').value.trim();
    const errEl = document.getElementById('token-error');
    errEl.style.display = 'none';
    const r = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
    if (r.status === 401) {
      errEl.textContent = 'Invalid token — try again'; errEl.style.display = 'block'; return;
    }
    if (!r.ok) {
      errEl.textContent = 'Server error'; errEl.style.display = 'block'; return;
    }
    localStorage.setItem('raps_token', TOKEN);
    showApp();
    applyData(await r.json());
  }

  function showApp() {
    document.getElementById('token-gate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadAuth();
    checkRunStatus();
  }

  async function checkRunStatus() {
    try {
      const r = await fetch('/api/run-status?token=' + encodeURIComponent(TOKEN));
      if (!r.ok) return;
      const d = await r.json();
      if (d.running) {
        // Run already in progress — reconnect via ws/stream
        reconnectToRun();
      }
    } catch(_) {}
  }

  async function loadResults() {
    try {
      const r = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
      if (r.ok) applyData(await r.json());
    } catch(_) {}
  }

  async function loadAuth() {
    try {
      const r = await fetch('/api/auth?token=' + encodeURIComponent(TOKEN));
      if (!r.ok) return;
      const d = await r.json();
      const el2 = document.getElementById('auth-2leg');
      const el3 = document.getElementById('auth-3leg');
      el2.textContent = '2-leg ' + (d.two_legged ? '✓' : '✗');
      el2.className = 'auth-chip ' + (d.two_legged ? 'auth-ok' : 'auth-miss');
      el3.textContent = '3-leg ' + (d.three_legged ? '✓' : '✗');
      el3.className = 'auth-chip ' + (d.three_legged ? 'auth-ok' : 'auth-miss');
      document.getElementById('login-btn').style.display = d.three_legged ? 'none' : 'inline-block';
      document.getElementById('logout-btn').style.display = d.three_legged ? 'inline-block' : 'none';
      if (d.three_legged) document.getElementById('auth-url-wrap').style.display = 'none';
    } catch(_) {}
  }

  async function triggerLogout() {
    const btn = document.getElementById('logout-btn');
    btn.disabled = true; btn.textContent = 'Logging out…';
    try {
      const r = await fetch('/auth/logout?token=' + encodeURIComponent(TOKEN), { method: 'POST' });
      if (!r.ok) { const e = await r.json().catch(() => ({})); alert('Logout failed: ' + (e.detail || r.status)); }
    } catch(_) { alert('Request failed'); }
    finally { btn.disabled = false; btn.textContent = 'Logout'; loadAuth(); }
  }

  async function triggerLogin() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Starting…';
    try {
      const r = await fetch('/auth/login?token=' + encodeURIComponent(TOKEN), { method: 'POST' });
      if (r.status === 409) { alert('Login already in progress'); btn.disabled = false; btn.textContent = 'Login device code'; return; }
      if (!r.ok) { alert('Failed to start login'); btn.disabled = false; btn.textContent = 'Login device code'; return; }
      btn.textContent = 'Waiting…';
      document.getElementById('auth-url-wrap').style.display = 'none';
      switchTab('log');
      const es = new EventSource('/stream/auth?token=' + encodeURIComponent(TOKEN));
      es.onmessage = function(e) {
        if (e.data === '__done__') { es.close(); btn.disabled = false; btn.textContent = 'Login device code'; loadAuth(); }
        else {
          appendLog(e.data);
          const m = e.data.match(/https?:\/\/\S+\?[^\s]+/);
          if (m) {
            const url = m[0].replace(/[.,;]$/, '');
            document.getElementById('auth-url-link').href = url;
            document.getElementById('auth-url-link').textContent = url;
            document.getElementById('auth-url-wrap').style.display = 'flex';
          }
        }
      };
      es.onerror = function() { es.close(); btn.disabled = false; btn.textContent = 'Login device code'; loadAuth(); };
    } catch(_) { btn.disabled = false; btn.textContent = 'Login device code'; }
  }

  // ── Data ────────────────────────────────────────────────────────────────────
  function applyData(data) {
    rows = data.rows || [];
    updateMeta(data.meta || {});
    populateSections();
    renderTable();
  }

  function updateMeta(meta) {
    const el = document.getElementById('meta');
    if (!meta.created) { el.textContent = 'No run data'; return; }
    const d = new Date(meta.created * 1000).toLocaleString();
    const s = meta.summary || {};
    el.textContent = d + '  ·  ' + (s.passed||0) + ' passed  ' + (s.failed||0) + ' failed  ' + (s.skipped||0) + ' skipped  ' + (meta.duration||0).toFixed(1) + 's';
  }

  function populateSections() {
    const sel = document.getElementById('f-section');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All sections</option>';
    [...new Set(rows.map(r => r.section).filter(Boolean))].sort().forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      if (s === cur) o.selected = true;
      sel.appendChild(o);
    });
  }

  // ── Table ───────────────────────────────────────────────────────────────────
  function renderTable() {
    const sec   = document.getElementById('f-section').value;
    const st    = document.getElementById('f-status').value;
    const marks = [...document.querySelectorAll('#filters input[type=checkbox]:checked')].map(c => c.value);

    const filtered = rows.filter(r => {
      if (sec && r.section !== sec) return false;
      if (st  && r.outcome !== st)  return false;
      if (marks.length && !marks.every(m => (r.marks||[]).includes(m))) return false;
      return true;
    });

    document.getElementById('tab-badge').textContent = filtered.length;
    document.getElementById('summary-line').textContent =
      filtered.length + ' of ' + rows.length + ' tests';

    function grp(r) {
      const p = (r.command || '').trim().split(/\s+/);
      return p.length >= 2 ? p[0] + ' ' + p[1] : (p[0] || r.section || '');
    }
    const sorted = [...filtered].sort((a, b) => {
      // Sort by section first, then by SR-ID number
      const secCmp = (a.section||'').localeCompare(b.section||'');
      if (secCmp !== 0) return secCmp;
      const numA = parseInt((a.id||'').replace(/\D/g,''), 10) || 0;
      const numB = parseInt((b.id||'').replace(/\D/g,''), 10) || 0;
      return numA - numB;
    });

    let html = '';
    let lastSection = null;
    for (const r of sorted) {
      const section = r.section || '';
      if (section !== lastSection) {
        html += `<tr class="group-sep"><td colspan="6"><span class="group-label">${esc(section)}</span></td></tr>`;
        lastSection = section;
      }
      const detailId = 'dr-' + esc(r.id.replace(/[^a-z0-9]/gi,'-'));
      const hasOut = !!r.output;
      const detailCls = r.outcome === 'failed' || r.outcome === 'error' ? 'fail'
                      : r.outcome === 'skipped' ? 'skip' : '';
      const arrowHtml = hasOut ? `<span class="expand-arrow" id="arr-${esc(r.id.replace(/[^a-z0-9]/gi,'-'))}">▶</span>` : '';
      html +=
        `<tr class="data-row${hasOut ? ' has-out' : ''}" data-id="${esc(r.id)}"` +
        (hasOut ? ` onclick="toggleDetail('${detailId}','${esc(r.id.replace(/[^a-z0-9]/gi,'-'))}')"` : '') + `>` +
        `<td><div class="cell-id">${arrowHtml}<span>${esc(r.id)}</span></div></td>` +
        `<td class="cell-cmd">${esc(r.command)}</td>` +
        `<td class="col-section cell-section">${esc(r.section)}</td>` +
        `<td class="col-marks">${(r.marks||[]).map(m => `<span class="cell-mark">${esc(m)}</span>`).join('')}</td>` +
        `<td id="st-${esc(r.id.replace(/[^a-z0-9]/gi,'-'))}">${statusBadge(r.outcome)}</td>` +
        `<td class="col-dur cell-dur">${r.duration != null ? r.duration.toFixed(1)+'s' : ''}</td>` +
        `</tr>` +
        (hasOut ? `<tr class="detail-row" id="${detailId}" style="display:none"><td colspan="6"><div class="detail-body ${detailCls}">${esc(r.output)}</div></td></tr>` : '');
    }
    document.getElementById('tbody').innerHTML = html;
  }

  function toggleDetail(detailId, idSlug) {
    const row = document.getElementById(detailId);
    if (!row) return;
    const open = row.style.display !== 'none';
    row.style.display = open ? 'none' : 'table-row';
    const arr = document.getElementById('arr-' + idSlug);
    if (arr) arr.classList.toggle('open', !open);
  }

  // ── Live row update (no full re-render) ─────────────────────────────────────
  function liveUpdateRow(srId, outcome) {
    // Update in-memory
    const row = rows.find(r => r.id === srId);
    if (row) row.outcome = outcome;
    // Update DOM directly (avoids scroll reset)
    const slug = srId.replace(/[^a-z0-9]/gi, '-');
    const cell = document.getElementById('st-' + slug);
    if (cell) {
      cell.innerHTML = statusBadge(outcome);
      return; // already in DOM, done
    }
    // Not in DOM yet (filtered out) — schedule a full re-render
    scheduleRender();
  }

  // ── Progress ────────────────────────────────────────────────────────────────
  function updateProgress(passed, failed, skipped, done, total, current) {
    document.getElementById('ps-passed').textContent = passed;
    document.getElementById('ps-failed').textContent = failed;
    document.getElementById('ps-skipped').textContent = skipped;
    const pct = total > 0 ? Math.min(100, Math.round(done / total * 100)) : 0;
    document.getElementById('prog-pct').textContent = pct + '% (' + done + '/' + total + ')';
    const fill = document.getElementById('progress-fill');
    fill.style.width = pct + '%';
    fill.classList.toggle('has-fail', failed > 0);
    document.getElementById('prog-current').textContent = current || '';
  }

  // ── Run ─────────────────────────────────────────────────────────────────────
  function setRunning(yes) {
    const btn = document.getElementById('run-btn');
    const abt = document.getElementById('abort-btn');
    btn.disabled = yes;
    btn.textContent = yes ? 'Running…' : 'Run Tests';
    abt.style.display = yes ? 'inline-block' : 'none';
  }

  function triggerRun() {
    setRunning(true);
    clearLog();
    updateProgress(0, 0, 0, 0, 295, null);
    document.getElementById('progress-panel').style.display = 'block';
    openRunWs('/ws/run');
  }

  function reconnectToRun() {
    setRunning(true);
    document.getElementById('progress-panel').style.display = 'block';
    openRunWs('/ws/stream');
  }

  function openRunWs(path) {
    if (_activeWs) { try { _activeWs.close(); } catch(_){} _activeWs = null; }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(proto + '//' + location.host + path + '?token=' + encodeURIComponent(TOKEN));
    _activeWs = ws;
    let done = false;

    function finish() {
      if (done) return; done = true;
      _activeWs = null;
      setRunning(false);
    }

    ws.onmessage = function(e) {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log') {
        appendLogLine(msg.text);
      } else if (msg.type === 'progress') {
        updateProgress(msg.passed, msg.failed, msg.skipped, msg.done, msg.total, msg.current);
        if (msg.sr_id && msg.outcome) {
          liveUpdateRow(msg.sr_id, msg.outcome);
        }
      } else if (msg.type === 'error') {
        finish();
        document.getElementById('progress-panel').style.display = 'none';
        alert('Run error: ' + msg.text);
      } else if (msg.type === 'done') {
        updateProgress(msg.passed, msg.failed, msg.skipped, msg.passed + msg.failed + msg.skipped, 295, null);
        finish();
        loadResults().then(() => switchTab('results'));
        setTimeout(() => { document.getElementById('progress-panel').style.display = 'none'; }, 3000);
      }
    };
    ws.onerror = function() { finish(); };
    ws.onclose = function() { finish(); };
  }

  async function abortRun() {
    await fetch('/run/abort?token=' + encodeURIComponent(TOKEN), { method: 'POST' }).catch(()=>{});
  }

  // ── Log tab ─────────────────────────────────────────────────────────────────
  function appendLog(text) {
    text.split('\n').forEach(line => appendLogLine(line));
  }

  function appendLogLine(text) {
    const el = document.getElementById('log-scroll');
    const span = document.createElement('span');
    if (/PASSED/.test(text)) span.className = 'log-pass';
    else if (/FAILED|ERROR/.test(text)) span.className = 'log-fail';
    else if (/SKIPPED/.test(text)) span.className = 'log-skip';
    else if (/^={3,}|^-{3,}/.test(text.trim())) span.className = 'log-head';
    span.textContent = text + '\n';
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  function clearLog() {
    document.getElementById('log-scroll').textContent = '';
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  function switchTab(name) {
    document.getElementById('pane-results').style.display = name === 'results' ? 'flex' : 'none';
    document.getElementById('pane-log').style.display     = name === 'log'     ? 'flex' : 'none';
    document.querySelectorAll('.tab').forEach((b, i) => {
      b.classList.toggle('active', (i === 0) === (name === 'results'));
    });
  }

  // ── Enter key on token input ─────────────────────────────────────────────────
  document.getElementById('token-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitToken();
  });
</script>
</body>
