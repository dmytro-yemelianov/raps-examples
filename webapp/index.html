<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAPS Test Results</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-monospace, 'Cascadia Code', monospace; background: #0f0f0f; color: #e0e0e0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
    h1 { font-size: 1rem; color: #fff; letter-spacing: 0.05em; }
    #meta { font-size: 0.75rem; color: #888; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #run-btn { padding: 10px 16px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: inherit; min-height: 44px; touch-action: manipulation; }
    #run-btn:disabled { background: #374151; cursor: not-allowed; }
    #run-btn:hover:not(:disabled) { background: #1d4ed8; }

    /* ── Auth bar ── */
    #auth-bar { padding: 8px 16px; background: #111; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 8px; font-size: 0.78rem; flex-wrap: wrap; flex-shrink: 0; }
    .auth-pill { padding: 4px 10px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
    .auth-ok   { background: #14532d; color: #4ade80; }
    .auth-miss { background: #450a0a; color: #f87171; }
    #login-btn { padding: 8px 14px; background: #7c3aed; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 0.75rem; font-family: inherit; min-height: 36px; touch-action: manipulation; }
    #login-btn:disabled { background: #374151; cursor: not-allowed; }
    #login-btn:hover:not(:disabled) { background: #6d28d9; }
    #auth-url-wrap { display: none; width: 100%; align-items: center; gap: 8px; background: #1e1b4b; border: 1px solid #4338ca; border-radius: 6px; padding: 8px 12px; flex-wrap: wrap; }
    #auth-url-wrap span { font-size: 0.72rem; color: #a5b4fc; white-space: nowrap; }
    #auth-url-link { font-size: 0.72rem; color: #818cf8; text-decoration: none; font-weight: 600; word-break: break-all; flex: 1; }
    #auth-url-link:hover { color: #a5b4fc; text-decoration: underline; }
    #auth-url-dismiss { background: none; border: none; color: #4338ca; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 4px; min-height: 32px; }

    /* ── Tabs ── */
    #tab-bar { background: #151515; border-bottom: 1px solid #222; display: flex; flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 12px 8px; font-size: 0.82rem; font-family: inherit; background: none; border: none; border-bottom: 2px solid transparent; color: #555; cursor: pointer; touch-action: manipulation; }
    .tab-btn:hover { color: #aaa; }
    .tab-btn.active { color: #e0e0e0; border-bottom-color: #2563eb; }

    /* ── Results tab ── */
    #tab-results { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    #filters { padding: 10px 16px; background: #151515; border-bottom: 1px solid #222; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
    #filters label { font-size: 0.8rem; color: #aaa; display: flex; align-items: center; gap: 6px; cursor: pointer; min-height: 36px; }
    #filters select { background: #1f1f1f; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; padding: 6px 8px; font-size: 0.8rem; font-family: inherit; min-height: 36px; max-width: 160px; }
    #summary-bar { padding: 6px 16px; background: #111; font-size: 0.72rem; color: #555; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    .table-wrap { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 10px 12px; color: #555; border-bottom: 1px solid #222; font-weight: 500; position: sticky; top: 0; background: #0f0f0f; z-index: 1; white-space: nowrap; }
    td { padding: 9px 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
    tr:hover td { background: #161616; }
    tr.has-output { cursor: pointer; }
    tr.detail-row td { padding: 0; border-bottom: 1px solid #222; background: #0a0a0a; }
    .detail-content { padding: 12px 14px 14px 28px; font-size: 0.75rem; line-height: 1.6; white-space: pre-wrap; color: #9ca3af; word-break: break-all; max-height: 300px; overflow-y: auto; }
    .detail-content.fail { color: #fca5a5; }
    .detail-content.skip { color: #6b7280; font-style: italic; }

    /* Hide lower-priority columns on small screens */
    @media (max-width: 640px) {
      .col-section, .col-marks, .col-duration { display: none; }
      #filters select { max-width: 100%; width: 100%; }
      #filters { flex-direction: column; align-items: stretch; gap: 6px; }
      #filters .filter-checks { display: flex; gap: 12px; flex-wrap: wrap; }
      td, th { padding: 10px 10px; }
    }

    /* ── Log tab ── */
    #tab-log { flex: 1; display: none; flex-direction: column; min-height: 0; }
    #log-output { flex: 1; padding: 12px 16px; font-size: 0.78rem; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; color: #ccc; -webkit-overflow-scrolling: touch; word-break: break-all; }
    #log-clear { padding: 8px 16px; background: #1a1a1a; border: none; border-bottom: 1px solid #222; color: #555; font-family: inherit; font-size: 0.75rem; cursor: pointer; text-align: left; flex-shrink: 0; }
    #log-clear:hover { color: #aaa; }

    /* ── Badges / chips ── */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-passed  { background: #14532d; color: #4ade80; }
    .badge-failed  { background: #450a0a; color: #f87171; }
    .badge-skipped { background: #1c1917; color: #a8a29e; }
    .badge-not-run { background: #111; color: #555; border: 1px solid #2a2a2a; }
    .badge-error   { background: #7c2d12; color: #fb923c; }
    .mark-chip { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.66rem; background: #1e293b; color: #7dd3fc; margin-right: 3px; }

    /* ── Token gate ── */
    #token-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 12px; padding: 24px; }
    #token-gate input { padding: 12px 14px; background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; border-radius: 6px; font-family: inherit; font-size: 1rem; width: 100%; max-width: 320px; }
    #token-gate button { padding: 12px 24px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 1rem; width: 100%; max-width: 320px; min-height: 48px; touch-action: manipulation; }
    #token-gate button:hover { background: #1d4ed8; }
    #token-error { color: #f87171; font-size: 0.8rem; display: none; }
    #app { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
  </style>
</head>
<body>

<div id="token-gate">
  <h2 style="color:#fff;font-size:1.1rem;letter-spacing:0.05em">RAPS Test Results</h2>
  <input id="token-input" type="password" placeholder="Dashboard token" autocomplete="current-password" />
  <button onclick="submitToken()">Access Dashboard</button>
  <p id="token-error">Invalid token — try again</p>
</div>

<div id="app">
  <header>
    <h1>RAPS Test Results</h1>
    <div id="meta">Loading&#x2026;</div>
    <button id="run-btn" onclick="triggerRun()">Run Tests</button>
  </header>

  <div id="auth-bar">
    <span>Auth:</span>
    <span id="auth-2leg" class="auth-pill auth-miss">2-leg ···</span>
    <span id="auth-3leg" class="auth-pill auth-miss">3-leg ···</span>
    <button id="login-btn" onclick="triggerLogin()" style="display:none">Login via device code</button>
    <div id="auth-url-wrap">
      <span>Open to authenticate:</span>
      <a id="auth-url-link" href="#" target="_blank" rel="noopener">···</a>
      <span id="auth-code-wrap" style="display:none">— enter code: <strong id="auth-code" style="color:#c4b5fd;letter-spacing:0.12em"></strong></span>
      <button id="auth-url-dismiss" onclick="document.getElementById('auth-url-wrap').style.display='none'" title="Dismiss">&#x2715;</button>
    </div>
  </div>

  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('results')">Results</button>
    <button class="tab-btn" onclick="switchTab('log')">Log</button>
  </div>

  <div id="tab-results">
    <div id="filters">
      <select id="f-section" onchange="renderTable()">
        <option value="">All sections</option>
      </select>
      <select id="f-status" onchange="renderTable()">
        <option value="">All statuses</option>
        <option>passed</option>
        <option>failed</option>
        <option>skipped</option>
        <option>not run</option>
      </select>
      <div class="filter-checks">
        <label><input type="checkbox" value="require_2leg" onchange="renderTable()"> 2-leg</label>
        <label><input type="checkbox" value="require_3leg" onchange="renderTable()"> 3-leg</label>
        <label><input type="checkbox" value="lifecycle" onchange="renderTable()"> lifecycle</label>
      </div>
    </div>
    <div id="summary-bar">&#x2014;</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>SR-ID</th>
            <th>Command</th>
            <th class="col-section">Section</th>
            <th class="col-marks">Marks</th>
            <th>Status</th>
            <th class="col-duration">Duration</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-log">
    <button id="log-clear" onclick="document.getElementById('log-output').textContent=''">Clear</button>
    <pre id="log-output"></pre>
  </div>
</div>

<script>
  let TOKEN = localStorage.getItem('raps_token') || '';
  let rows = [];

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function switchTab(name) {
    document.getElementById('tab-results').style.display = name === 'results' ? 'flex' : 'none';
    document.getElementById('tab-log').style.display     = name === 'log'     ? 'flex' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0) === (name === 'results'));
    });
  }

  function toggleDetail(id) {
    const row = document.getElementById(id);
    if (!row) return;
    const open = row.style.display !== 'none';
    row.style.display = open ? 'none' : 'table-row';
    // flip the arrow indicator
    const prev = row.previousElementSibling;
    if (prev) {
      const arrow = prev.querySelector('span[style*="color:#374151"]');
      if (arrow) arrow.textContent = open ? '▶' : '▼';
    }
  }

  function appendLog(text) {
    const el = document.getElementById('log-output');
    el.textContent += text + '\n';
    el.scrollTop = el.scrollHeight;
  }

  if (TOKEN) attemptAutoLogin();

  async function attemptAutoLogin() {
    try {
      const resp = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
      if (resp.ok) {
        showApp();
        applyData(await resp.json());
      } else {
        localStorage.removeItem('raps_token');
        TOKEN = '';
      }
    } catch (_) {
      localStorage.removeItem('raps_token');
      TOKEN = '';
    }
  }

  async function submitToken() {
    TOKEN = document.getElementById('token-input').value.trim();
    const resp = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
    if (resp.status === 401) {
      document.getElementById('token-error').style.display = 'block';
      return;
    }
    if (!resp.ok) {
      document.getElementById('token-error').textContent = 'Server error — try again later';
      document.getElementById('token-error').style.display = 'block';
      return;
    }
    localStorage.setItem('raps_token', TOKEN);
    showApp();
    applyData(await resp.json());
  }

  function showApp() {
    document.getElementById('token-gate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadAuth();
  }

  async function loadResults() {
    try {
      const resp = await fetch('/api/results?token=' + encodeURIComponent(TOKEN));
      if (resp.ok) applyData(await resp.json());
    } catch (_) {}
  }

  async function loadAuth() {
    try {
      const resp = await fetch('/api/auth?token=' + encodeURIComponent(TOKEN));
      if (!resp.ok) return;
      const d = await resp.json();
      const el2 = document.getElementById('auth-2leg');
      const el3 = document.getElementById('auth-3leg');
      const btn = document.getElementById('login-btn');
      el2.textContent = '2-leg ' + (d.two_legged ? '\u2713' : '\u2717');
      el2.className = 'auth-pill ' + (d.two_legged ? 'auth-ok' : 'auth-miss');
      el3.textContent = '3-leg ' + (d.three_legged ? '\u2713' : '\u2717');
      el3.className = 'auth-pill ' + (d.three_legged ? 'auth-ok' : 'auth-miss');
      btn.style.display = d.three_legged ? 'none' : 'inline-block';
      if (d.three_legged) document.getElementById('auth-url-wrap').style.display = 'none';
    } catch (_) {}
  }

  async function triggerLogin() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Starting\u2026';
    try {
      const resp = await fetch('/auth/login?token=' + encodeURIComponent(TOKEN), { method: 'POST' });
      if (resp.status === 409) { alert('Login already in progress'); btn.disabled = false; btn.textContent = 'Login via device code'; return; }
      if (!resp.ok) { alert('Failed to start login'); btn.disabled = false; btn.textContent = 'Login via device code'; return; }

      btn.textContent = 'Waiting\u2026';
      document.getElementById('auth-url-wrap').style.display = 'none';
      document.getElementById('auth-code-wrap').style.display = 'none';
      switchTab('log');

      const es = new EventSource('/stream/auth?token=' + encodeURIComponent(TOKEN));
      es.onmessage = function(e) {
        if (e.data === '__done__') {
          es.close();
          btn.disabled = false;
          btn.textContent = 'Login via device code';
          loadAuth();
        } else {
          appendLog(e.data);
          // Extract URL
          const urlM = e.data.match(/https?:\/\/\S+/);
          if (urlM) {
            const wrap = document.getElementById('auth-url-wrap');
            const link = document.getElementById('auth-url-link');
            link.href = urlM[0];
            link.textContent = urlM[0];
            wrap.style.display = 'flex';
          }
          // Extract device code (e.g. "ABCD-1234" or "code: XXXX")
          const codeM = e.data.match(/\b([A-Z0-9]{4,6}[-\s][A-Z0-9]{4,6})\b/) ||
                        e.data.match(/(?:code|Code)[:\s]+([A-Za-z0-9]{6,})/);
          if (codeM) {
            const code = codeM[1].trim();
            document.getElementById('auth-code').textContent = code;
            document.getElementById('auth-code-wrap').style.display = 'inline';
          }
        }
      };
      es.onerror = function() { es.close(); btn.disabled = false; btn.textContent = 'Login via device code'; loadAuth(); };
    } catch (_) { btn.disabled = false; btn.textContent = 'Login via device code'; }
  }

  function applyData(data) {
    rows = data.rows || [];
    updateMeta(data.meta || {});
    populateSections();
    renderTable();
  }

  function updateMeta(meta) {
    const el = document.getElementById('meta');
    if (!meta.created) { el.textContent = 'No run data yet'; return; }
    const d = new Date(meta.created * 1000).toLocaleString();
    const s = meta.summary || {};
    el.textContent = 'Last run: ' + d + ' \u00b7 ' + (s.passed||0) + ' passed \u00b7 ' +
      (s.failed||0) + ' failed \u00b7 ' + (s.skipped||0) + ' skipped \u00b7 ' +
      (meta.duration||0).toFixed(1) + 's';
  }

  function populateSections() {
    const sel = document.getElementById('f-section');
    const current = sel.value;
    sel.innerHTML = '<option value="">All sections</option>';
    [...new Set(rows.map(r => r.section))].forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      if (s === current) o.selected = true;
      sel.appendChild(o);
    });
  }

  function renderTable() {
    const sec   = document.getElementById('f-section').value;
    const st    = document.getElementById('f-status').value;
    const marks = [...document.querySelectorAll('#filters input[type=checkbox]:checked')].map(c => c.value);

    const filtered = rows.filter(r => {
      if (sec   && r.section !== sec) return false;
      if (st    && r.outcome !== st)  return false;
      if (marks.length && !marks.every(m => r.marks.includes(m))) return false;
      return true;
    });

    document.getElementById('summary-bar').textContent =
      'Showing ' + filtered.length + ' of ' + rows.length + ' tests';

    function cmdGroup(r) {
      const parts = (r.command || '').trim().split(/\s+/);
      return parts.length >= 2 ? parts[0] + ' ' + parts[1] : (parts[0] || '');
    }

    const sorted = [...filtered].sort((a, b) => cmdGroup(a).localeCompare(cmdGroup(b)));

    let html = '';
    let lastGroup = null;
    for (const r of sorted) {
      const g = cmdGroup(r);
      if (g !== lastGroup) {
        html += '<tr><td colspan="6" style="padding:10px 14px 4px;color:#4b5563;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid #222;background:#0f0f0f">' + esc(g) + '</td></tr>';
        lastGroup = g;
      }
      const detailId = 'detail-' + esc(r.id.replace(/[^a-z0-9]/gi, '-'));
      const hasOutput = r.output != null;
      const detailClass = r.outcome === 'failed' || r.outcome === 'error' ? 'fail'
                        : r.outcome === 'skipped' ? 'skip' : '';
      html +=
        '<tr class="' + (hasOutput ? 'has-output' : '') + '" ' + (hasOutput ? 'onclick="toggleDetail(\'' + detailId + '\')"' : '') + '>' +
        '<td style="color:#94a3b8;font-weight:600;white-space:nowrap">' + esc(r.id) + (hasOutput ? ' <span style="color:#374151;font-size:0.65rem">▶</span>' : '') + '</td>' +
        '<td style="font-size:0.73rem;color:#94a3b8;word-break:break-all">' + esc(r.command) + '</td>' +
        '<td class="col-section" style="color:#475569;white-space:nowrap">' + esc(r.section) + '</td>' +
        '<td class="col-marks">' + (r.marks||[]).map(m => '<span class="mark-chip">' + esc(m) + '</span>').join('') + '</td>' +
        '<td><span class="badge badge-' + esc(r.outcome.replace(/ /g, '-')) + '">' + esc(r.outcome) + '</span></td>' +
        '<td class="col-duration" style="color:#475569;white-space:nowrap">' + (r.duration != null ? esc(r.duration.toFixed(2)) + 's' : '&#x2014;') + '</td>' +
        '</tr>' +
        (hasOutput
          ? '<tr class="detail-row" id="' + detailId + '" style="display:none"><td colspan="6"><div class="detail-content ' + detailClass + '">' + esc(r.output) + '</div></td></tr>'
          : '');
    }
    document.getElementById('tbody').innerHTML = html;
  }

  async function triggerRun() {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = 'Starting\u2026';
    try {
      const resp = await fetch('/run?token=' + encodeURIComponent(TOKEN), { method: 'POST' });
      if (resp.status === 409) { alert('A run is already in progress'); btn.disabled = false; btn.textContent = 'Run Tests'; return; }
      if (!resp.ok) { alert('Failed to start run'); btn.disabled = false; btn.textContent = 'Run Tests'; return; }

      document.getElementById('log-output').textContent = '';
      switchTab('log');
      btn.textContent = 'Running\u2026';

      const es = new EventSource('/stream?token=' + encodeURIComponent(TOKEN));
      es.onmessage = function(e) {
        if (e.data === '__done__') {
          es.close();
          btn.disabled = false;
          btn.textContent = 'Run Tests';
          loadResults();
          switchTab('results');
        } else {
          appendLog(e.data);
        }
      };
      es.onerror = function() { es.close(); btn.disabled = false; btn.textContent = 'Run Tests'; };
    } catch (_) { btn.disabled = false; btn.textContent = 'Run Tests'; }
  }

  document.getElementById('token-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitToken();
  });
</script>
</body>
</html>
